<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Munich Trip">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Munich Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --accent: #c8f03c;
  --accent2: #a8cc2a;
  --danger: #ff5f5f;
  --safe: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
body { display: flex; flex-direction: column; }

.app-header {
  padding: calc(env(safe-area-inset-top, 0px) + 16px) 20px 16px;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg);
}
.app-title { font-size: 13px; font-weight: 500; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
.app-logo { font-size: 18px; }
.back-btn { font-size: 13px; color: var(--accent); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 4px 0; display: none; }

.screen { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; display: none; padding-bottom: calc(var(--safe) + 24px); }
.screen.active { display: block; }

/* SCREEN 1 — Setup */
.setup-hero { padding: 32px 20px 20px; }
.setup-hero h1 { font-size: 28px; font-weight: 300; line-height: 1.2; color: var(--text); margin-bottom: 6px; }
.setup-hero h1 span { color: var(--accent); font-weight: 500; }
.setup-hero p { font-size: 14px; color: var(--text2); }

.section-block { margin: 0 16px 12px; background: var(--bg2); border-radius: 16px; border: 0.5px solid var(--border); overflow: hidden; }
.section-label { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; padding: 14px 16px 6px; }

.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
.date-cell { background: var(--bg2); padding: 10px 16px 14px; }
.date-cell label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 4px; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; }
.date-cell input[type=date] {
  background: none; border: none; color: var(--text);
  font-size: 16px; font-family: 'DM Sans', sans-serif; font-weight: 400;
  width: 100%; outline: none; cursor: pointer;
  color-scheme: dark;
}

.toggle-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-top: 0.5px solid var(--border); }
.toggle-item:first-child { border-top: none; }
.toggle-info { flex: 1; }
.toggle-name { font-size: 15px; color: var(--text); }
.toggle-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
.ios-toggle { position: relative; width: 44px; height: 26px; flex-shrink: 0; margin-left: 12px; }
.ios-toggle input { opacity: 0; width: 0; height: 0; }
.ios-track { position: absolute; inset: 0; border-radius: 13px; background: var(--bg3); border: 0.5px solid var(--border2); transition: background 0.25s; cursor: pointer; }
.ios-track:before { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; background: var(--text2); top: 3px; left: 3px; transition: transform 0.25s, background 0.25s; }
.ios-toggle input:checked + .ios-track { background: var(--accent); border-color: var(--accent); }
.ios-toggle input:checked + .ios-track:before { transform: translateX(18px); background: #0f0f0f; }

.generate-wrap { padding: 20px 16px; }
.generate-btn {
  width: 100%; padding: 16px;
  background: var(--accent); color: #0f0f0f;
  border: none; border-radius: 14px;
  font-size: 16px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  cursor: pointer; letter-spacing: 0.01em;
  transition: opacity 0.15s, transform 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.generate-btn:active { transform: scale(0.98); opacity: 0.85; }
.generate-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* SCREEN 2 — Loading */
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; }
.loader-ring { width: 48px; height: 48px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 14px; color: var(--text2); font-family: 'DM Mono', monospace; }

/* SCREEN 3 — List */
.list-header { padding: 20px 20px 12px; }
.trip-title { font-size: 22px; font-weight: 300; color: var(--text); }
.trip-title strong { font-weight: 500; color: var(--accent); }
.trip-meta { font-size: 13px; color: var(--text2); margin-top: 3px; font-family: 'DM Mono', monospace; }

.progress-wrap { margin: 0 16px 16px; }
.progress-track { height: 3px; background: var(--bg3); border-radius: 2px; margin-bottom: 6px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
.progress-text { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; display: flex; justify-content: space-between; }

.weather-strip { margin: 0 16px 12px; background: var(--bg2); border-radius: 16px; border: 0.5px solid var(--border); overflow: hidden; }
.weather-strip-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; padding: 12px 16px 8px; }
.weather-days { display: flex; gap: 1px; background: var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
.weather-days::-webkit-scrollbar { display: none; }
.weather-day { background: var(--bg2); flex-shrink: 0; padding: 10px 14px 12px; text-align: center; min-width: 72px; flex: 1; }
.wd-name { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
.wd-icon { font-size: 18px; margin-bottom: 4px; }
.wd-temp { font-size: 12px; color: var(--text); font-weight: 500; }
.wd-desc { font-size: 10px; color: var(--text3); margin-top: 2px; }

.list-section { margin: 0 16px 10px; }
.list-section-hdr { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; padding: 4px 0 8px; display: flex; align-items: center; gap: 6px; }
.list-section-hdr .sec-count { color: var(--accent); }
.list-card { background: var(--bg2); border-radius: 16px; border: 0.5px solid var(--border); overflow: hidden; }
.list-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-top: 0.5px solid var(--border); cursor: pointer; transition: background 0.1s; user-select: none; }
.list-item:first-child { border-top: none; }
.list-item:active { background: var(--bg3); }
.item-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.item-check.done { background: var(--accent); border-color: var(--accent); }
.item-check.done::after { content: ''; width: 5px; height: 9px; border: 2px solid #0f0f0f; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px, -1px); display: block; }
.item-text { font-size: 15px; color: var(--text); flex: 1; transition: color 0.2s; }
.item-text.done { color: var(--text3); text-decoration: line-through; }
.item-qty { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; background: var(--bg3); padding: 2px 7px; border-radius: 8px; flex-shrink: 0; }

.add-row { display: flex; align-items: center; gap: 0; border-top: 0.5px solid var(--border); background: var(--bg2); }
.add-input { flex: 1; background: none; border: none; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; padding: 12px 16px; outline: none; }
.add-input::placeholder { color: var(--text3); }
.add-btn { width: 36px; height: 36px; background: var(--accent); border: none; border-radius: 50%; margin-right: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; color: #0f0f0f; font-weight: 300; line-height: 1; transition: transform 0.1s; }
.add-btn:active { transform: scale(0.9); }

</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">Munich Trip</div>
  <button class="back-btn" id="back-btn" onclick="goBack()">← New trip</button>
</div>

<!-- SCREEN 1: Setup -->
<div class="screen active" id="screen-setup">
  <div class="setup-hero">
    <h1>Pack for<br><span>Munich.</span></h1>
    <p>Enter your dates and I'll handle the rest.</p>
  </div>

  <div class="section-block">
    <div class="section-label">Travel dates</div>
    <div class="date-row">
      <div class="date-cell">
        <label>Departure</label>
        <input type="date" id="dep-date">
      </div>
      <div class="date-cell">
        <label>Return</label>
        <input type="date" id="ret-date">
      </div>
    </div>
  </div>

  <div class="section-block">
    <div class="section-label">Options</div>
    <div class="toggle-item">
      <div class="toggle-info">
        <div class="toggle-name">Going to the gym?</div>
        <div class="toggle-sub">Adds gym bag section</div>
      </div>
      <label class="ios-toggle"><input type="checkbox" id="gym-toggle"><span class="ios-track"></span></label>
    </div>
    <div class="toggle-item">
      <div class="toggle-info">
        <div class="toggle-name">Restock Munich toiletries?</div>
        <div class="toggle-sub">Go bag top-up checklist</div>
      </div>
      <label class="ios-toggle"><input type="checkbox" id="toiletries-toggle"><span class="ios-track"></span></label>
    </div>
    <div class="toggle-item">
      <div class="toggle-info">
        <div class="toggle-name">Bringing private laptop?</div>
        <div class="toggle-sub">Adds laptop + charger</div>
      </div>
      <label class="ios-toggle"><input type="checkbox" id="laptop-toggle"><span class="ios-track"></span></label>
    </div>
  </div>

  <div class="generate-wrap">
    <button class="generate-btn" id="gen-btn" onclick="startGeneration()">
      Build my packing list →
    </button>
  </div>
</div>

<!-- SCREEN 2: Loading -->
<div class="screen" id="screen-loading">
  <div class="loading-screen">
    <div class="loader-ring"></div>
    <div class="loader-text" id="loader-text">checking munich weather...</div>
  </div>
</div>

<!-- SCREEN 3: List -->
<div class="screen" id="screen-list">
  <div class="list-header">
    <div class="trip-title" id="trip-title">Munich</div>
    <div class="trip-meta" id="trip-meta"></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-text"><span id="prog-text">0 of 0 packed</span><span id="prog-pct">0%</span></div>
  </div>
  <div id="weather-section"></div>
  <div id="packing-sections"></div>
</div>

<script>
const MUNICH_LAT = 48.1351, MUNICH_LON = 11.5820;
let allItemIds = [], checkedIds = new Set();

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('back-btn').style.display = id === 'screen-list' ? 'block' : 'none';
}

function goBack() {
  show('screen-setup');
  document.getElementById('packing-sections').innerHTML = '';
  document.getElementById('weather-section').innerHTML = '';
  allItemIds = []; checkedIds.clear();
}

async function startGeneration() {
  const dep = document.getElementById('dep-date').value;
  const ret = document.getElementById('ret-date').value;
  if (!dep || !ret || new Date(ret) <= new Date(dep)) { alert('Please pick valid dates.'); return; }

  const gym = document.getElementById('gym-toggle').checked;
  const toiletries = document.getElementById('toiletries-toggle').checked;
  const privateLaptop = document.getElementById('laptop-toggle').checked;
  const nights = Math.round((new Date(ret) - new Date(dep)) / 86400000);

  show('screen-loading');

  let weather = null;
  try {
    document.getElementById('loader-text').textContent = 'checking munich weather...';
    const dates = getDates(dep, ret);
    const start = dates[0].toISOString().split('T')[0];
    const end = dates[dates.length-1].toISOString().split('T')[0];
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${MUNICH_LAT}&longitude=${MUNICH_LON}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode&timezone=Europe%2FBerlin&start_date=${start}&end_date=${end}`;
    const res = await fetch(url);
    weather = await res.json();
    document.getElementById('loader-text').textContent = 'building your list...';
    await sleep(600);
  } catch(e) {
    await sleep(800);
  }

  const wInfo = analyzeWeather(weather);
  renderTrip(dep, ret, nights, wInfo, weather, gym, toiletries, privateLaptop);
  show('screen-list');
}

function getDates(dep, ret) {
  const dates = [], cur = new Date(dep), last = new Date(ret);
  while (cur <= last) { dates.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
  return dates;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function analyzeWeather(data) {
  if (!data || !data.daily) return { cold: false, warm: false, mild: true, hasRain: false, hasSnow: false, codes: [] };
  const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const avgMax = avg(data.daily.temperature_2m_max);
  return {
    cold: avgMax < 10, warm: avgMax > 22, mild: avgMax >= 10 && avgMax <= 22,
    hasRain: data.daily.weathercode.some(c => c >= 51 && c < 71),
    hasSnow: data.daily.weathercode.some(c => c >= 71 && c <= 77),
    codes: data.daily.weathercode, maxTemps: data.daily.temperature_2m_max, minTemps: data.daily.temperature_2m_min
  };
}

function wCodeInfo(c) {
  if (c===0) return {icon:'☀️',desc:'Clear'};
  if (c<=2) return {icon:'⛅',desc:'Partly cloudy'};
  if (c===3) return {icon:'☁️',desc:'Overcast'};
  if (c<=48) return {icon:'🌫️',desc:'Fog'};
  if (c<=57) return {icon:'🌧️',desc:'Drizzle'};
  if (c<=67) return {icon:'🌧️',desc:'Rain'};
  if (c<=77) return {icon:'❄️',desc:'Snow'};
  if (c<=82) return {icon:'🌦️',desc:'Showers'};
  return {icon:'⛈️',desc:'Storm'};
}

function renderTrip(dep, ret, nights, w, weatherData, gym, toiletries, privateLaptop) {
  const fmtDate = d => new Date(d).toLocaleDateString('en-DE', {day:'numeric', month:'short'});
  document.getElementById('trip-title').innerHTML = `<strong>Munich</strong> · ${fmtDate(dep)} – ${fmtDate(ret)}`;
  document.getElementById('trip-meta').textContent = `${nights} night${nights>1?'s':''} · office trip`;

  if (weatherData && weatherData.daily) {
    const dates = getDates(dep, ret);
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let html = `<div class="weather-strip"><div class="weather-strip-label">Munich forecast</div><div class="weather-days">`;
    dates.forEach((d, i) => {
      const info = wCodeInfo(weatherData.daily.weathercode[i]);
      const hi = Math.round(weatherData.daily.temperature_2m_max[i]);
      const lo = Math.round(weatherData.daily.temperature_2m_min[i]);
      html += `<div class="weather-day"><div class="wd-name">${days[d.getDay()]}</div><div class="wd-icon">${info.icon}</div><div class="wd-temp">${lo}–${hi}°</div><div class="wd-desc">${info.desc}</div></div>`;
    });
    html += `</div></div>`;
    document.getElementById('weather-section').innerHTML = html;
  }

  const sections = buildSections(nights, w, gym, toiletries, privateLaptop);
  allItemIds = []; checkedIds.clear();
  let html = '';
  sections.forEach(sec => {
    const secId = sec.key;
    const items = sec.items;
    items.forEach((_, i) => allItemIds.push(`${secId}-${i}`));
    html += `<div class="list-section">
      <div class="list-section-hdr">${sec.label} <span class="sec-count" id="count-${secId}"></span></div>
      <div class="list-card" id="card-${secId}">`;
    items.forEach((item, i) => {
      const id = `${secId}-${i}`;
      html += `<div class="list-item" id="row-${id}" onclick="toggle('${id}')">
        <div class="item-check" id="chk-${id}"></div>
        <div class="item-text" id="txt-${id}">${item.name}</div>
        ${item.qty ? `<div class="item-qty">×${item.qty}</div>` : ''}
      </div>`;
    });
    html += `<div class="add-row">
      <input class="add-input" id="add-${secId}" placeholder="Add item..." onkeydown="if(event.key==='Enter')addItem('${secId}')">
      <button class="add-btn" onclick="addItem('${secId}')">+</button>
    </div>`;
    html += `</div></div>`;
  });
  document.getElementById('packing-sections').innerHTML = html;
  sections.forEach(sec => updateSectionCount(sec.key, sec.items.length));
  updateProgress();
}

function toggle(id) {
  if (checkedIds.has(id)) checkedIds.delete(id);
  else checkedIds.add(id);
  const done = checkedIds.has(id);
  document.getElementById('chk-' + id).className = 'item-check' + (done ? ' done' : '');
  document.getElementById('txt-' + id).className = 'item-text' + (done ? ' done' : '');
  updateProgress();
}

function addItem(secKey) {
  const input = document.getElementById('add-' + secKey);
  const val = input.value.trim();
  if (!val) return;
  const idx = allItemIds.filter(id => id.startsWith(secKey+'-')).length;
  const id = `${secKey}-custom-${Date.now()}`;
  allItemIds.push(id);
  const card = document.getElementById('card-' + secKey);
  const addRow = card.querySelector('.add-row');
  const el = document.createElement('div');
  el.className = 'list-item'; el.id = 'row-' + id;
  el.onclick = () => toggle(id);
  el.innerHTML = `<div class="item-check" id="chk-${id}"></div><div class="item-text" id="txt-${id}">${val}</div>`;
  card.insertBefore(el, addRow);
  input.value = '';
  const secItems = allItemIds.filter(i => i.startsWith(secKey+'-'));
  updateSectionCount(secKey, secItems.length);
  updateProgress();
}

function updateSectionCount(secKey, total) {
  const checked = allItemIds.filter(id => id.startsWith(secKey+'-') && checkedIds.has(id)).length;
  const el = document.getElementById('count-' + secKey);
  if (el) el.textContent = checked > 0 ? `${checked}/${total}` : '';
}

function updateProgress() {
  const total = allItemIds.length;
  const done = checkedIds.size;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${done} of ${total} packed`;
  document.getElementById('prog-pct').textContent = pct + '%';
  const secKeys = [...new Set(allItemIds.map(id => id.replace(/-[^-]*$/, '')))];
  secKeys.forEach(k => {
    const total = allItemIds.filter(id => id.startsWith(k+'-')).length;
    updateSectionCount(k, total);
  });
}

function buildSections(nights, w, gym, toiletries, privateLaptop) {
  const socks = nights + 1;
  const pants = Math.ceil((nights+1)/2);
  const gymShirts = Math.max(1, Math.ceil(nights/2));

  return [
    {
      key: 'work', label: '💼 Work essentials',
      items: [
        {name:'Work laptop'}, {name:'Work badge / access card'}, {name:'Notebook & pen'}, {name:'Reusable water bottle'},
      ]
    },
    {
      key: 'tech', label: '🔌 Tech & charging',
      items: [
        {name:'iPhone'}, {name:'iPad'}, {name:'Apple Watch'},
        {name:'Laptop charger (work)'}, {name:'iPhone cable / charger'}, {name:'iPad charger'},
        {name:'Apple Watch charger'}, {name:'Power bank'},
        ...(privateLaptop ? [{name:'Private laptop'},{name:'Private laptop charger'}] : []),
      ]
    },
    {
      key: 'clothing', label: '👕 Clothing',
      items: [
        {name:'T-shirts / casual tops', qty: socks},
        {name:'Underwear', qty: socks},
        {name:'Socks', qty: socks},
        {name:'Smart-casual trousers / chinos', qty: pants},
        {name:'Pyjamas'},
        {name:'Belt'},
        ...(w.cold || w.hasSnow ? [{name:'Warm coat'},{name:'Jumper / hoodie'},{name:'Scarf & gloves'}] : []),
        ...(w.mild ? [{name:'Light jacket or hoodie'}] : []),
        ...(w.warm ? [{name:'Light layer for A/C indoors'}] : []),
        ...(w.hasRain && !w.hasSnow ? [{name:'Compact umbrella / rain jacket'}] : []),
        ...(w.hasSnow ? [{name:'Waterproof boots'}] : []),
      ]
    },
    {
      key: 'footwear', label: '👟 Footwear',
      items: [
        {name:'Smart-casual shoes (office)'}, {name:'Casual sneakers'},
      ]
    },
    {
      key: 'personal', label: '🪪 Personal essentials',
      items: [
        {name:'Wallet'}, {name:'House keys'}, {name:'Reading glasses'},
        {name:'Sunglasses'}, {name:'ID / passport'},
      ]
    },
    ...(gym ? [{
      key: 'gym', label: '🏋️ Gym bag',
      items: [
        {name:'Gym card'}, {name:'Gym shoes'}, {name:'Gym pants'},
        {name:'Gym shirts', qty: gymShirts}, {name:'Sports socks'}, {name:'Gym towel'},
      ]
    }] : []),
    ...(toiletries ? [{
      key: 'toiletries', label: '🧴 Munich go bag restock',
      items: [
        {name:'Shower gel'}, {name:'Shampoo'}, {name:'Contact lenses (supply)'},
        {name:'Contact lens solution'}, {name:'Pomade / hair product'},
        {name:'After shave / balm'}, {name:'Deodorant'}, {name:'Toothbrush & toothpaste'},
      ]
    }] : []),
  ];
}

if ('serviceWorker' in navigator) {
